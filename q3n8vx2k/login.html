<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Noto Serif SC", serif;
            background: radial-gradient(ellipse at 30% 20%, #1a1a22 0%, #0d0d12 55%);
            color: #e8e6e3;
        }
        .card {
            width: 100%;
            max-width: 380px;
            padding: 2rem 2rem 1.75rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(12px);
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            margin: 0 0 1.5rem;
            text-align: center;
            opacity: 0.9;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
            opacity: 0.75;
        }
        input {
            width: 100%;
            padding: 0.55rem 0.65rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.35);
            color: #f0eeeb;
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: rgba(180, 200, 230, 0.45);
        }
        button[type="submit"] {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.65rem;
            border: none;
            border-radius: 6px;
            background: rgba(120, 150, 190, 0.35);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
        }
        button[type="submit"]:hover {
            background: rgba(140, 170, 210, 0.45);
        }
        #login-error {
            min-height: 1.25rem;
            margin-top: 0.75rem;
            font-size: 0.9rem;
            color: #e8a0a0;
            text-align: center;
        }
        .back {
            display: block;
            margin-top: 1.25rem;
            text-align: center;
            font-size: 0.85rem;
        }
        .back a {
            color: #9eb8d8;
            text-decoration: none;
        }
        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>登录</h1>
        <form id="login-form" autocomplete="on">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">进入</button>
        </form>
        <p id="login-error" aria-live="polite"></p>
        <p class="back"><a href="../index.html">返回首页</a></p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
